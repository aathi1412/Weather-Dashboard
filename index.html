<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <Header class="container-header">

        <div class="header-main">
            <h1 class="header-content">Weather Dashboard</h1>
        </div>

        <div class="header-search">
            <input type="text" class="input-search">
            <button class="button-search">search</button>
        </div>
    </Header>

    <main>
            <div>
                <span class="city-name">city name</span>
            </div>
            <div class="date-time">
                <span>51:23 pm</span>
                <span>monday , 21 dec</span>
            </div>
        <section class="section-1">
            <div class="current-section">
                <p class="temperature">temperature</p>
                <p class="weather-condition">weather condition: sunny</p>
                <div>
                    <span>Feels like 31</span>
                    <span>low | high</span>
                </div>
            </div>
        </section>
        
        <section class="section-grid">
            <div class="grid-1">Rain</div>
            <div class="grid-2">Humidity</div>
            <div class="grid-3">cloudy</div>
        </section>

        <section class="forcast-grid">
            <div class="card-monday"></div>
            <div class="card-tuesday"></div>
            <div class="card-wednesday"></div>
            <div class="card-thursday"></div>
            <div class="card-friday"></div>
        </section>
    </main>
    <footer>
        copyrights @aathi all reserved
    </footer>

</body>
</html>
