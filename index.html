<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>
<!-- header------------------ -->
    <Header class="container-header">

        <div class="header-main">
            <h1 class="header-content">Weather Dashboard</h1>
        </div>

        <div class="header-search">
            <input type="text" class="input-search">
            <button class="button-search">search</button>
        </div>
    </Header>

<!-- main -------------------------- -->
    <main>

        <section class="current-info">
            
            <div class="date-time">
                <p class="time">12:23 PM</p>
                <p class="date">Monday , 21 dec</p>
            </div>
            <div class="city-name-header">
                <span class="city-name">Asia/Kolkata</span>
            </div>
        </section>

        <section class="current-weather-info">

            <div class="current-weather-box">
                <div class="weather-items essential" >
                    <div>Temperature:</div>
                    <div>30</div>
                </div>
                <div class="weather-items essential">
                    <div>weather:</div>
                    <div>sunny</div>
                </div>
                <div class="weather-items">
                    <div>Feels like 31</div>
                </div>
                <div class="weather-items">low | high</div>
            </div>
            
        </section>
        
        <section class="section-grid">
            <div class="grid">Rain</div>
            <div class="grid">Humidity</div>
            <div class="grid">cloudy</div>
        </section>

        <section class="forcast-grid">
            <div class="card-monday"></div>
            <div class="card-tuesday"></div>
            <div class="card-wednesday"></div>
            <div class="card-thursday"></div>
            <div class="card-friday"></div>
        </section>
    </main>
    <footer>
        copyrights @aathi all reserved
    </footer>

</body>
</html>
