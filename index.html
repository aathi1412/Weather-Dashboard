<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/ec0d6ee503.js" crossorigin="anonymous"></script>
</head>
<body>
<!-- header------------------ -->
    <Header class="container-header">

        <div class="header-main">
            <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
            <h1 class="header-content">Weather Dashboard</h1>
        </div>

        <div class="header-search">
            <input type="text" placeholder="Enter city name" class="input-search">
            <button class="button-search">search</button>
        </div>
    </Header>

<!-- main -------------------------- -->
    <main>

        <section class="current-info">
            
            <div class="date-time">
                <i class="fa-solid fa-cloud-sun-rain fa-beat fa-2xl" style="color: rgb(219, 222, 228);"></i>
                <p class="time js-time">Time</p>
                <p class="date js-date">Date</p>
            </div>
            <div class="city-name-header">
                <span class="city-name" id="place">Asia/Kolkata</span>
                <p class="city-name" id="code">IN</p>
            </div>
        </section>

        <section class="current-weather-info">
        </section>

        <section class="section-grid">
        </section>

        <section class="container-future-forcast">
            <div class="weather-today-container">
            </div>
            <div class="future-forcast-grid">
            </div>
        </section>
    

        
    </main>
    <footer>
        copyrights @aathi all reserved
    </footer>
<script type="module" src="./main.js"></script>
</body>
</html>
