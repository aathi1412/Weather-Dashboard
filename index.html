<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/ec0d6ee503.js" crossorigin="anonymous"></script>
</head>
<body>
<!-- header------------------ -->
    <Header class="container-header">

        <div class="header-main">
            <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
            <h1 class="header-content">Weather Dashboard</h1>
        </div>

        <div class="header-search">
            <input type="text" class="input-search">
            <button class="button-search">search</button>
        </div>
    </Header>

<!-- main -------------------------- -->
    <main>

        <section class="current-info">
            
            <div class="date-time">
                <i class="fa-solid fa-cloud-sun-rain fa-beat fa-2xl" style="color: rgb(219, 222, 228);"></i>
                <p class="time js-time">Time</p>
                <p class="date js-date">Date</p>
            </div>
            <div class="city-name-header">
                <span class="city-name">Asia/Kolkata</span>
            </div>
        </section>

        <section class="current-weather-info">

            <div class="current-weather-box">
                <div class="weather-items essential" >
                    <div>Temperature:</div>
                    <div>30</div>
                </div>
                <div class="weather-items essential">
                    <div>weather:</div>
                    <div>sunny</div>
                </div>
                <div class="weather-items essential">
                    <div>Rain:</div>
                    <div>30</div>
                </div>
                <div class="weather-items essential">
                    <div>Sunrise:</div>
                    <div>5:30 AM</div>
                </div>
                <div class="weather-items essential">
                    <div>Sunset:</div>
                    <div>6:30 PM</div>
                </div>
                <div class="weather-items">
                    <div>Feels like 31</div>
                </div>
                <div class="weather-items">low 28 | high 38</div>
            </div>
            
        </section>
        
        <section class="section-grid">
            <div class="grid">
                <i class="fa-solid fa-droplet fa-beat" style="color: rgb(219, 222, 228);"></i>
                <span>Humidity</span>
            </div>
            <div class="grid">
                <i class="fa-solid fa-wind fa-beat" style="color: rgb(219, 222, 228);"></i>
                <span>Wind</span>
            </div>
            <div class="grid">
                <i class="fa-solid fa-smog fa-beat" style="color: rgb(219, 222, 228);"></i>
                <span>Air Quality</span>
            </div>
        </section>

        <section class="future-forcast-grid">
            <div class="cards">
                <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
                Monday
            </div>
            <div class="cards">
                <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
                Tuesday
            </div>
            <div class="cards">
                <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
                wednesday
            </div>
            <div class="cards">
                <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
                thursday
            </div>
            <div class="cards">
                <img src=" https://openweathermap.org/payload/api/media/file/10d@2x.png" alt="Weather-icon">
                friday
            </div>
        </section>
    </main>
    <footer>
        copyrights @aathi all reserved
    </footer>
<script type="module" src="./main.js"></script>
</body>
</html>
